<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Eco Home Fence — Viviendas Modulares en España</title>
    <meta name="description" content="Artículos sobre viviendas modulares en España: precios, normativa, terrenos, instalación y consejos. Todo lo que necesitas saber.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        /* ── Blog Hero ── */
        .blog-hero {
            background: var(--dark);
            padding: 72px 0 56px;
            text-align: center;
        }
        .blog-hero__tag {
            display: inline-block;
            background: var(--accent);
            color: #fff;
            font-size: 0.72rem;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            padding: 5px 14px;
            border-radius: 100px;
            margin-bottom: 18px;
        }
        .blog-hero__title {
            color: #fff;
            font-size: 2.8rem;
            margin-bottom: 12px;
        }
        .blog-hero__sub {
            color: rgba(255,255,255,0.55);
            font-size: 1.05rem;
            max-width: 540px;
            margin: 0 auto;
        }

        /* ── Blog Grid ── */
        .blog-section { background: var(--bg-neutral); padding: 64px 0 96px; }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 32px;
        }

        /* ── Post Card ── */
        .post-card {
            background: var(--bg-white);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-soft);
            transition: var(--transition);
            display: flex;
            flex-direction: column;
        }
        .post-card:hover {
            transform: translateY(-6px);
            box-shadow: var(--shadow-medium);
        }

        .post-card__img-wrap {
            position: relative;
            height: 220px;
            overflow: hidden;
        }
        .post-card__img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        .post-card:hover .post-card__img { transform: scale(1.06); }

        .post-card__badge {
            position: absolute;
            top: 16px;
            left: 16px;
            background: var(--primary);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 100px;
        }

        .post-card__body {
            padding: 28px 28px 32px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .post-card__date {
            font-size: 0.78rem;
            color: var(--text-muted);
            font-weight: 500;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .post-card__title {
            font-family: var(--font-heading);
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--dark);
            line-height: 1.3;
            margin-bottom: 12px;
        }
        .post-card__title a {
            color: inherit;
            text-decoration: none;
        }
        .post-card__title a:hover { color: var(--primary-dark); }

        .post-card__excerpt {
            font-size: 0.92rem;
            color: var(--text-muted);
            line-height: 1.65;
            flex: 1;
            margin-bottom: 20px;
        }

        .post-card__cta {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.88rem;
            font-weight: 600;
            color: var(--primary);
            transition: var(--transition);
        }
        .post-card__cta:hover { color: var(--primary-dark); gap: 10px; }
        .post-card__cta svg { width: 16px; height: 16px; transition: var(--transition); }

        /* ── Loading / Empty ── */
        .blog-state {
            text-align: center;
            padding: 80px 24px;
            color: var(--text-muted);
        }
        .blog-state__icon { font-size: 3rem; margin-bottom: 16px; }
        .blog-state__text { font-size: 1rem; }
        .blog-spinner {
            width: 40px; height: 40px;
            border: 3px solid var(--bg-gray);
            border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 0 auto 18px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── Responsive ── */
        @media (max-width: 768px) {
            .blog-hero__title { font-size: 2rem; }
            .blog-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="header">
        <div class="container">
            <nav class="nav">
                <a href="index.html" class="logo"><img src="logo.png" alt="Eco Home Fence" class="logo__img"></a>
                <ul class="nav__list">
                    <li><a href="index.html#modelos" class="nav__link">Modelos</a></li>
                    <li><a href="index.html#ventajas" class="nav__link">Ventajas</a></li>
                    <li><a href="index.html#plazos" class="nav__link">Plazos</a></li>
                    <li><a href="blog.html" class="nav__link" style="color:#fff;">Blog</a></li>
                </ul>
                <a href="index.html#contacto" class="btn btn--primary" style="padding: 12px 24px;">Contacto</a>
            </nav>
        </div>
    </header>

    <!-- Blog Hero -->
    <section class="blog-hero">
        <div class="container">
            <span class="blog-hero__tag">Eco Home Fence Blog</span>
            <h1 class="blog-hero__title">Guías, Consejos y Novedades</h1>
            <p class="blog-hero__sub">Todo lo que necesitas saber sobre viviendas modulares en España: precios, normativa, terrenos y mucho más.</p>
        </div>
    </section>

    <!-- Blog Grid -->
    <section class="blog-section">
        <div class="container">
            <div class="blog-grid" id="blogGrid">
                <div class="blog-state">
                    <div class="blog-spinner"></div>
                    <p class="blog-state__text">Cargando artículos...</p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p class="footer__logo"><img src="logo.png" alt="Eco Home Fence" class="footer__logo-img"></p>
            <p class="footer__copy">&copy; 2026 Eco Home Fence. Empresa filial de Elite Properties Spain.</p>
        </div>
    </footer>

    <!-- WhatsApp -->
    <a href="https://wa.me/34619846388" class="whatsapp-float" target="_blank">
        <svg viewBox="0 0 24 24" fill="white" width="30" height="30"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766.001-3.187-2.575-5.77-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.502-2.961-2.617-.087-.116-.708-.94-.708-1.793s.448-1.273.607-1.446c.159-.173.346-.217.462-.217l.332.006c.106.005.249-.04.39.298.144.347.491 1.2.534 1.287.043.087.072.188.014.304-.058.116-.087.188-.173.289l-.26.304c-.087.086-.177.18-.076.354.101.174.449.741.964 1.201.662.591 1.221.774 1.394.86s.274.072.376-.043c.101-.116.433-.506.549-.68.116-.173.231-.145.39-.087s1.011.477 1.184.564.289.13.332.202c.045.072.045.419-.099.824zm-3.423-14.416c-6.627 0-12 5.373-12 12s5.373 12 12 12 12-5.373 12-12-5.373-12-12-12zm.029 18.88c-1.161 0-2.305-.292-3.318-.844l-3.677.964.984-3.595c-.607-1.052-.927-2.246-.926-3.468.001-5.824 4.74-10.563 10.564-10.563 5.826 0 10.564 4.741 10.564 10.564 0 5.824-4.74 10.564-10.564 10.564z"/></svg>
    </a>

<script>
    // ── CONFIG ──
    var BLOG_WEBHOOK = 'https://n8n.srv1538677.hstgr.cloud/webhook/blog-posts';

    // ── LOAD POSTS ──
    function loadBlog() {
        var grid = document.getElementById('blogGrid');

        fetch(BLOG_WEBHOOK)
        .then(function(res) {
            if (!res.ok) throw new Error('Error cargando blog');
            return res.json();
        })
        .then(function(posts) {
            if (!posts || posts.length === 0) {
                grid.innerHTML = '<div class="blog-state"><div class="blog-state__icon">📝</div><p class="blog-state__text">Próximamente publicaremos artículos. ¡Vuelve pronto!</p></div>';
                return;
            }
            grid.innerHTML = posts.map(function(p) {
                var fecha = p.fecha_publicacion ? formatDate(p.fecha_publicacion) : '';
                var img = p.imagen_portada || 'fotos recursos/28.jfif';
                var slug = p.slug || '#';
                return '<article class="post-card">' +
                    '<div class="post-card__img-wrap">' +
                        '<img class="post-card__img" src="' + esc(img) + '" alt="' + esc(p.titulo) + '" loading="lazy">' +
                        (p.keyword_principal ? '<span class="post-card__badge">' + esc(p.keyword_principal) + '</span>' : '') +
                    '</div>' +
                    '<div class="post-card__body">' +
                        '<div class="post-card__date">📅 ' + fecha + '</div>' +
                        '<h2 class="post-card__title"><a href="post.html?slug=' + esc(slug) + '">' + esc(p.titulo) + '</a></h2>' +
                        '<p class="post-card__excerpt">' + esc(p.extracto || '') + '</p>' +
                        '<a href="post.html?slug=' + esc(slug) + '" class="post-card__cta">Leer artículo <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg></a>' +
                    '</div>' +
                '</article>';
            }).join('');
        })
        .catch(function() {
            grid.innerHTML = '<div class="blog-state"><div class="blog-state__icon">📝</div><p class="blog-state__text">Próximamente publicaremos artículos. ¡Vuelve pronto!</p></div>';
        });
    }

    function formatDate(iso) {
        try {
            return new Date(iso).toLocaleDateString('es-ES', { day: 'numeric', month: 'long', year: 'numeric' });
        } catch(e) { return iso; }
    }

    function esc(s) {
        return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // Header scroll
    window.onscroll = function() {
        var h = document.querySelector('.header');
        if (h) { h.classList.toggle('header--scrolled', window.scrollY > 50); }
    };

    loadBlog();
</script>
</body>
</html>
